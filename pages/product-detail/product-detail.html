<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Sản Phẩm | DEUX</title>
    <link rel="icon" href="/assets/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="/assets/style.css">
    <link rel="stylesheet" href="product-detail.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <header></header>

    <main class="product-detail-section">
        <div class="container">
            <div class="product-layout">
                <div class="product-gallery">
                    <div class="main-image-container">
                        <img id="productImage" src="" alt="Sản phẩm">
                    </div>
                </div>

                <div class="product-info">
                    <h1 id="productName" class="section-title" style="text-align: left; margin-bottom: 10px;">Đang
                        tải...</h1>
                    <p class="detail-price" id="productPrice">0đ</p>
                    <div class="divider"></div>
                    <p class="detail-description" id="productDescription"></p>

                    <div class="selection-group">
                        <h4>Kích cỡ</h4>
                        <div class="size-picker">
                            <button class="size-btn">S</button>
                            <button class="size-btn active">M</button>
                            <button class="size-btn">L</button>
                            <button class="size-btn">XL</button>
                        </div>
                    </div>

                    <div class="selection-group">
                        <h4>Số lượng</h4>
                        <div class="quantity-box">
                            <button id="btn-minus"><i class="fas fa-minus"></i></button>
                            <span id="quantity-val">1</span>
                            <button id="btn-plus"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>

                    <button id="addToCart" class="btn-add" style="padding: 18px; font-size: 16px;">
                        <i class="fas fa-cart-plus"></i> THÊM VÀO GIỎ HÀNG
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer></footer>

    <script src="/assets/components.js"></script>
    <script src="/main.js"></script>
    <script src="product-detail.js"></script>
</body>

</html>
