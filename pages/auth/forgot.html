<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEUX | Quên Mật Khẩu</title>
    <link rel="icon" href="/assets/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="/assets/style.css">

<body>

    <header></header>

    <main class="forgot-password-main">
        <div class="simple-auth-container">
            <h1 class="simple-title">QUÊN MẬT KHẨU</h1>
            <p class="simple-subtitle">Nhập email của bạn để lấy lại mật khẩu</p>

            <form class="simple-form">
                <div class="input-line-group">
                    <input type="email" id="reset-email" placeholder="Email Address" required>
                </div>

                <div id="forgot-msg"></div>
                <button type="submit" class="btn-reset-password">LẤY LẠI MẬT KHẨU</button>
            </form>

            <div class="simple-footer">
                <a href="login.html" class="back-link">QUAY LẠI ĐĂNG NHẬP</a>
            </div>
        </div>
    </main>

    <footer></footer>

    <script src="/assets/components.js"></script>
    <script src="/assets/main.js"></script>
    <script src="/pages/auth/auth.js"></script>
