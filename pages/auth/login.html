<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEUX | Đăng Nhập</title>
    <link rel="icon" href="/assets/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="/assets/style.css">
    <link rel="stylesheet" href="login.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <header></header>

    <main class="login-wrapper">
        <div class="login-container">
            <div class="login-header">
                <h2 class="auth-title">TÀI KHOẢN</h2>
                <p class="subtitle">Chào mừng bạn đã đến với DEUX</p>
            </div>

            <form class="login-form">
                <div class="input-group">
                    <label for="email">Email của bạn</label>
                    <input type="email" id="email" placeholder="nguyenvana@email.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Ghi nhớ đăng nhập
                    </label>
                    <a href="forgot.html" class="forgot-pass">Quên mật khẩu?</a>
                </div>

                <div id="login-msg"></div>
                <button type="submit" class="btn-auth-submit">Đăng Nhập</button>
            </form>

            <div class="auth-card-footer">
                <p>Bạn chưa có tài khoản?</p>
                <a href="register.html" class="link-auth">ĐĂNG KÝ NGAY</a>
            </div>
        </div>
    </main>

    <footer></footer>

    <script src="/assets/components.js"></script>
    <script src="/assets/main.js"></script>
    <script src="/pages/auth/auth.js"></script>
</body>

</html>
