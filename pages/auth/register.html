<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEUX | Đăng Ký</title>
    <link rel="icon" href="/assets/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="/assets/style.css">
    <link rel="stylesheet" href="register.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <header></header>

    <main class="register-wrapper">
        <div class="register-container">
            <div class="register-header">
                <h2 class="auth-title">TÀI KHOẢN</h2>
                <p class="subtitle">Chào mừng bạn đã đến với DEUX</p>
            </div>

            <form class="register-form">
                <div class="form-grid">
                    <div class="input-group">
                        <label for="fullname">Họ Tên<span class="mausao">*</span></label>
                        <input type="text" id="fullname" placeholder="Nguyen Van A" required>
                    </div>

                    <div class="input-group">
                        <label for="email">Email<span class="mausao">*</span></label>
                        <input type="email" id="email" placeholder="nguyenvana@email.com" required>
                    </div>

                    <div class="input-group">
                        <label for="phone">Số điện thoại<span class="mausao">*</span></label>
                        <input type="tel" id="phone" placeholder="0123456789" required>
                    </div>

                    <div class="input-group">
                        <label for="address">Địa chỉ<span class="mausao">*</span></label>
                        <input type="text" id="address" placeholder="Quan 1, Tp.HCM" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Mật Khẩu<span class="mausao">*</span></label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>

                    <div class="input-group">
                        <label for="confirm-password">Nhập Lại Mật Khẩu<span class="mausao">*</span></label>
                        <input type="password" id="confirm-password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="contact-to-you">
                    <h3 class="contact-title">Liên hệ</h3>
                    <p class="contact-subtitle">Chúng tôi có thể liên hệ với bạn qua hình thức</p>
                    <div class="checkbox-group">
                        <label>
                            <input type="checkbox" name="contact" value="call">
                            Gọi điện
                        </label>
                        <label>
                            <input type="checkbox" name="contact" value="zalo">
                            Zalo
                        </label>
                        <label>
                            <input type="checkbox" name="contact" value="email">
                            Email
                        </label>
                    </div>
                </div>

                <div id="register-msg"></div>
                <button type="submit" class="btn-auth-submit">Đăng Ký</button>
            </form>

            <div class="auth-card-footer">
                <p>Bạn đã có tài khoản?</p>
                <a href="login.html" class="link-auth">ĐĂNG NHẬP TẠI ĐÂY</a>
            </div>
        </div>
    </main>

    <footer></footer>

    <script src="/assets/components.js"></script>
    <script src="/assets/main.js"></script>
    <script src="/pages/auth/auth.js"></script>
</body>

</html>
